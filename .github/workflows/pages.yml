name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Restore Emscripten cache
        uses: actions/cache@v4
        with:
          path: .emscripten-cache
          key: ${{ runner.os }}-emscripten-cache-v1
          restore-keys: |
            ${{ runner.os }}-emscripten-cache-

      - name: Install Emscripten
        shell: bash
        run: |
          mkdir -p "$HOME/opt"
          if [ ! -x "$HOME/opt/emsdk/emsdk" ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/opt/emsdk"
            cd "$HOME/opt/emsdk"
            ./emsdk install latest
            ./emsdk activate latest
          fi
          source "$HOME/opt/emsdk/emsdk_env.sh"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WebAssembly site
        shell: bash
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
